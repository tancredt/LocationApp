  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary Meta Tags -->
    <title>Hazmat Equipment Location Management | Fire Rescue Victoria</title>
    <meta name="title" content="Hazmat Equipment Location Management | Fire Rescue Victoria">
    <meta name="description" content="Internal application for managing the location and tracking of hazardous materials detection equipment including gas detectors, calibration cylinders, and sensors across Fire Rescue Victoria stations and facilities.">
    <meta name="keywords" content="hazmat, equipment management, gas detection, calibration, fire rescue, Victoria, emergency services, safety equipment, location tracking, inventory management">
    <meta name="author" content="Fire Rescue Victoria - Hazmat Department">
    <meta name="robots" content="noindex, nofollow">
    <meta name="rating" content="general">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Hazmat Equipment Location Management">
    <meta property="og:description" content="Internal application for managing hazardous materials detection equipment locations across Fire Rescue Victoria facilities.">
    
    <!-- Application Info -->
    <meta name="application-name" content="FRV Hazmat Equipment Tracker">
    <meta name="theme-color" content="#42b883">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Hazmat Tracker">
    
    <!-- Security and Performance -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest">
    
    <style>
      /* Prevent flash of unstyled content */
      #app {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }
      .loading-screen {
        text-align: center;
        padding: 2rem;
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e0e0e0;
        border-top-color: #42b883;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 1rem;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-text {
        color: #666;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Loading screen shown before JavaScript loads -->
      <div class="loading-screen">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading Hazmat Equipment Location Management Application...</p>
        <p style="color: #999; font-size: 0.8rem; margin-top: 0.5rem;">Fire Rescue Victoria - Internal System</p>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
    
    <!-- NoScript message for users with JavaScript disabled -->
    <noscript>
      <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f5f5f5; display: flex; align-items: center; justify-content: center; padding: 2rem; z-index: 9999;">
        <div style="background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; text-align: center;">
          <h1 style="color: #2c3e50; margin-bottom: 1rem; font-size: 1.5rem;">JavaScript Required</h1>
          <p style="color: #666; margin-bottom: 1rem;">The Hazmat Equipment Location Management Application requires JavaScript to function properly.</p>
          <p style="color: #666; margin-bottom: 1rem;">This is an internal Fire Rescue Victoria application used for tracking and managing hazardous materials detection equipment including:</p>
          <ul style="text-align: left; color: #666; margin-bottom: 1rem; padding-left: 1.5rem;">
            <li>Multi-gas detectors (MicroRAE, MultiRAE, ToxiRAE)</li>
            <li>Calibration gas cylinders</li>
            <li>Sensor modules and replacements</li>
            <li>Maintenance scheduling and fault reporting</li>
          </ul>
          <p style="color: #666;">Please enable JavaScript in your browser settings and refresh the page.</p>
        </div>
      </div>
    </noscript>
  </body>
</html>
